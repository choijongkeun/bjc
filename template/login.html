<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NexusDeFi | Institutional Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#ff516a",
                        "secondary": "#4edea3",
                        "on-surface-variant": "#c2c6d6",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "surface-tint": "#adc6ff",
                        "surface-container-high": "#222a3d",
                        "on-background": "#dae2fd",
                        "tertiary": "#ffb2b7",
                        "on-secondary-container": "#00311f",
                        "surface-variant": "#2d3449",
                        "inverse-surface": "#dae2fd",
                        "outline": "#8c909f",
                        "inverse-primary": "#005ac2",
                        "error-container": "#93000a",
                        "surface-bright": "#31394d",
                        "surface-dim": "#0b1326",
                        "outline-variant": "#424754",
                        "on-tertiary-fixed-variant": "#92002a",
                        "on-secondary": "#003824",
                        "on-primary": "#002e6a",
                        "on-error": "#690005",
                        "primary-container": "#4d8eff",
                        "on-surface": "#dae2fd",
                        "secondary-fixed-dim": "#4edea3",
                        "on-secondary-fixed-variant": "#005236",
                        "primary": "#adc6ff",
                        "tertiary-fixed": "#ffdadb",
                        "background": "#0b1326",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container-lowest": "#060e20",
                        "on-tertiary": "#67001b",
                        "on-primary-fixed": "#001a42",
                        "surface-container-highest": "#2d3449",
                        "on-primary-fixed-variant": "#004395",
                        "surface": "#0b1326",
                        "surface-container-low": "#131b2e",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#d8e2ff",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-container": "#00a572",
                        "inverse-on-surface": "#283044",
                        "on-secondary-fixed": "#002113",
                        "on-primary-container": "#00285d",
                        "on-tertiary-fixed": "#40000d",
                        "surface-container": "#171f33",
                        "on-tertiary-container": "#5b0017"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "base": "4px",
                        "lg": "24px",
                        "sm": "12px",
                        "md": "16px",
                        "xl": "40px",
                        "container-max": "1440px",
                        "xs": "8px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "data-md": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "data-lg": ["JetBrains Mono"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "data-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "data-lg": ["20px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0b1326;
            background-image: 
                radial-gradient(at 0% 0%, rgba(77, 142, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(78, 222, 163, 0.03) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md">
<!-- Auth Shell Suppression: No TopNavBar or SideNavBar per "Linear/Transactional" rule -->
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="glass-card rounded-xl p-xl shadow-2xl flex flex-col gap-lg">
<!-- Branding -->
<div class="flex flex-col items-center text-center gap-xs">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-xs">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">BJC Institutional</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to NexusDeFi protocol</p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md" onsubmit="return false">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-wider" for="login_id">Login ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pl-[48px] pr-md font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="login_id" placeholder="Enter your institutional ID" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-primary uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pl-[48px] pr-md font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-lg py-md rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-xs">
                    Sign In
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<div class="relative flex py-sm items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-outline">NEW INSTITUTIONS</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Referral Section -->
<div class="bg-surface-container-low border border-outline-variant/30 rounded-lg p-md flex flex-col gap-sm">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Referral Code Verification</h3>
<div class="flex gap-xs">
<input class="flex-1 bg-surface-container-highest border border-outline-variant rounded-lg px-md py-xs font-data-md text-data-md text-secondary placeholder:text-outline/50 uppercase outline-none focus:border-secondary transition-all" placeholder="CODE-XXXXX" type="text"/>
<button class="bg-surface-variant text-on-surface-variant px-md rounded-lg font-label-sm text-label-sm hover:bg-surface-bright transition-colors border border-outline-variant">
                        Verify
                    </button>
</div>
</div>
<!-- Footer Links -->
<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-secondary font-bold hover:underline" href="#">Create an account</a>
</p>
</div>
<div class="mt-lg flex justify-center gap-lg">
<div class="flex items-center gap-xs opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm">256-bit AES</span>
</div>
<div class="flex items-center gap-xs opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="gpp_good">gpp_good</span>
<span class="font-label-sm text-label-sm">ISO 27001</span>
</div>
</div>
</div>
</main>
<!-- Background Atmospheric Element -->
<div class="fixed top-0 right-0 p-xl pointer-events-none opacity-20">
<div class="flex flex-col gap-xs items-end">
<span class="font-data-md text-data-md text-secondary">NEXUS_CORE_v4.2.0</span>
<span class="font-data-md text-data-md text-primary">SYSTEM_STATUS: SECURE</span>
</div>
</div>
<script>
        // Simple micro-interactions
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/10');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/10');
            });
        });

        // Toggle Password Visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        if (togglePass && passInput) {
            togglePass.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                togglePass.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
</body></html>
